services:
  akshar-ocr:
    build: .
    restart: unless-stopped
    # Host port publish NAHI karvanu (Coolify Traefik thi route kare).
    # 8000 fakt internally expose karo.
    expose:
      - "8000"
    # Coolify magic: aa env thi domain ne aa service na port 8000 par route kare.
    # Domain Coolify UI ma set karo (e.g. ocr.divyajivan.com).
    environment:
      - SERVICE_FQDN_AKSHAROCR_8000

# ---------------------------------------------------------------------------
# Local testing (Coolify vagar) mate compose na vaapro - direct Docker vaapro:
#   docker build -t akshar-ocr .
#   docker run --rm -p 8000:8000 akshar-ocr
#   -> http://localhost:8000
# ---------------------------------------------------------------------------
